<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nevafil Game</title>

<style>
/* Genel Body */
body {
  margin: 0;
  padding: 0;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: #121212;
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

/* Lisans Prompt Overlay */
#licensePrompt {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  padding: 20px;
  box-sizing: border-box;
}

/* Lisans kutusu */
.license-box {
  background: #1e1e1e;
  padding: 35px;
  border-radius: 15px;
  width: 100%;
  max-width: 360px;
  text-align: center;
  box-shadow: 0 0 30px rgba(0,0,0,0.5);
  transition: transform 0.3s ease;
}

.license-box:hover {
  transform: translateY(-3px);
}

/* Başlık */
.license-box h2 {
  color: #6c5ce7;
  margin-bottom: 20px;
  font-size: 1.8em;
}

/* Input */
#licenseInput {
  width: 100%;
  padding: 12px;
  margin-bottom: 20px;
  border-radius: 8px;
  border: 1px solid #444;
  background: #121212;
  color: #fff;
  font-size: 1em;
  box-sizing: border-box;
}

/* Placeholder rengi */
#licenseInput::placeholder {
  color: #888;
}

/* Buton */
button {
  width: 100%;
  padding: 12px;
  background: #6c5ce7;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 1em;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #5a4ddb;
}

/* Game container */
#gameContainer {
  width: 100%;
  height: 100vh;
  display: none;
}

/* Responsive */
@media (max-width: 480px) {
  .license-box {
    padding: 25px;
  }

  .license-box h2 {
    font-size: 1.5em;
  }

  #licenseInput {
    padding: 10px;
  }

  button {
    padding: 10px;
  }
}
</style>

<script type="module" src="license-check.js"></script>

</head>
<body>

<div id="licensePrompt">
  <div class="license-box">
    <h2>Lisans Anahtarınızı Girin</h2>
    <input type="text" id="licenseInput" placeholder="GAME-XXXXXX">
    <button onclick="onLicenseSubmit()">Oyunu Başlat</button>
  </div>
</div>

<div id="gameContainer"></div>

</body>
</html>
