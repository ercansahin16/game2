<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Nevafil Game</title>

<style>
body {
  margin:0;
  padding:0;
  font-family:Arial;
  background:#111;
}

#licensePrompt {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.license-box {
  background: white;
  padding: 35px;
  border-radius: 12px;
  width: 320px;
  text-align: center;
}

#licenseInput {
  width: 100%;
  padding: 10px;
  margin-bottom: 15px;
}

button {
  width:100%;
  padding:10px;
  background:#6c5ce7;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
</style>

<script type="module" src="license-check.js"></script>

</head>
<body>

<div id="licensePrompt">
  <div class="license-box">
    <h2>Lisans Anahtarınızı Girin</h2>
    <input type="text" id="licenseInput" placeholder="GAME-XXXXXX">
    <button onclick="onLicenseSubmit()">Oyunu Başlat</button>
  </div>
</div>

<div id="gameContainer" style="display:none;"></div>

</body>
</html>
